<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --accent-1: #00d4ff; --accent-2: #7b2ff7; --accent-3: #ff6b35; --bg: #0a0a1a; --bg-card: #12122a; --text: #fff; --text-sec: #b0b0d0; --border: rgba(255,255,255,0.08); --whatsapp: #25D366; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
        .container { text-align:center; max-width:500px; }
        .code { font-size:8rem; font-weight:900; background:linear-gradient(135deg,var(--accent-1),var(--accent-2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; margin-bottom:0.5rem; }
        .code span { display:block; font-size:1.5rem; -webkit-text-fill-color:var(--text-sec); margin-top:0.5rem; }
        h1 { font-size:1.5rem; font-weight:700; margin-bottom:0.8rem; }
        p { color:var(--text-sec); font-size:0.95rem; line-height:1.7; margin-bottom:2rem; }
        .btn { display:inline-flex; align-items:center; gap:0.6rem; padding:0.9rem 2rem; border:none; border-radius:50px; font-size:1rem; font-weight:600; cursor:pointer; transition:0.3s; font-family:inherit; text-decoration:none; }
        .btn-primary { background:linear-gradient(135deg,var(--accent-1),var(--accent-2)); color:white; box-shadow:0 4px 20px rgba(0,212,255,0.3); }
        .btn-primary:hover { transform:translateY(-3px); box-shadow:0 8px 35px rgba(0,212,255,0.5); }
        .btn-whatsapp { background:var(--whatsapp); color:white; box-shadow:0 4px 20px rgba(37,211,102,0.3); }
        .btn-whatsapp:hover { background:#1da851; transform:translateY(-3px); box-shadow:0 8px 35px rgba(37,211,102,0.5); }
        .actions { display:flex; flex-direction:column; gap:1rem; align-items:center; }
        .search-icon { font-size:4rem; color:var(--accent-3); opacity:0.3; margin-bottom:1rem; }
        @media(max-width:480px) { .code { font-size:5rem; } h1 { font-size:1.2rem; } }
    </style>
</head>

    <div class="container">

        <div class="actions">

</body>
