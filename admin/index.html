<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Vincent IT</title>
    <link rel="icon" type="image/svg+xml" href="/img/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --accent-1: #00d4ff; --accent-2: #7b2ff7; --bg: #0a0a1a; --bg-card: #12122a; --text: #fff; --text-sec: #b0b0d0; --border: rgba(255,255,255,0.08); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); padding:2rem; }
        .login-page { display:flex; align-items:center; justify-content:center; min-height:80vh; }
        .login-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:2.5rem; width:100%; max-width:400px; text-align:center; }
        .login-card h1 { font-size:1.5rem; margin-bottom:0.5rem; background:linear-gradient(135deg,var(--accent-1),var(--accent-2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .login-card p { color:var(--text-sec); font-size:0.85rem; margin-bottom:1.5rem; }
        .login-card input { width:100%; padding:0.7rem; margin-bottom:1rem; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; color:#fff; font-family:inherit; }
        .login-card input:focus { outline:none; border-color:var(--accent-1); }
        .login-card button { width:100%; padding:0.7rem; background:linear-gradient(135deg,var(--accent-1),var(--accent-2)); border:none; border-radius:8px; color:#fff; font-weight:600; cursor:pointer; font-family:inherit; }
        .login-card button:hover { opacity:0.9; }
        .login-card .error { color:#ff6b35; font-size:0.85rem; margin-top:0.5rem; }
        .logout-bar { display:flex; justify-content:flex-end; margin-bottom:1rem; }
        .logout-bar button { padding:0.3rem 0.8rem; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-sec); cursor:pointer; font-family:inherit; font-size:0.8rem; }
        .logout-bar button:hover { border-color:var(--accent-1); color:var(--accent-1); }
        #dashboard { display:none; }
        h1.dash-title { font-size:1.8rem; margin-bottom:2rem; background:linear-gradient(135deg,var(--accent-1),var(--accent-2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; margin-bottom:2rem; }
        .stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:1.5rem; text-align:center; }
        .stat-num { font-size:2rem; font-weight:900; background:linear-gradient(135deg,var(--accent-1),var(--accent-2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .stat-label { color:var(--text-sec); font-size:0.85rem; margin-top:0.3rem; }
        .tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
        .tab-btn { padding:0.6rem 1.2rem; border:1px solid var(--border); border-radius:8px; background:var(--bg-card); color:var(--text-sec); cursor:pointer; transition:0.3s; font-family:inherit; }
        .tab-btn:hover, .tab-btn.active { border-color:var(--accent-1); color:var(--accent-1); }
        .panel { display:none; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:1.5rem; overflow-x:auto; }
        .panel.active { display:block; }
        table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        th, td { padding:0.7rem 0.8rem; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
        th { color:var(--accent-1); font-weight:600; }
        tr:hover td { background:rgba(255,255,255,0.03); }
        .status { padding:0.2rem 0.6rem; border-radius:50px; font-size:0.7rem; font-weight:600; }
        .status.approved, .status.completed { background:rgba(0,212,255,0.15); color:var(--accent-1); }
        .status.pending { background:rgba(255,107,53,0.15); color:#ff6b35; }
        .status.cancelled { background:rgba(255,68,68,0.15); color:#ff4444; }
        .action-btn { padding:0.2rem 0.6rem; border:1px solid var(--border); border-radius:4px; background:transparent; color:var(--text-sec); cursor:pointer; font-size:0.7rem; }
        .action-btn:hover { border-color:var(--accent-1); color:var(--accent-1); }
        .msg { max-height:100px; overflow:hidden; text-overflow:ellipsis; max-width:200px; }
        .form-message { margin-top:0.5rem; font-size:0.85rem; color:var(--accent-1); }
        @media(max-width:768px) { body { padding:1rem; } .stats { grid-template-columns:repeat(2,1fr); } }
        .blog-form { max-width:600px; }
        .blog-form input, .blog-form textarea, .blog-form select { width:100%; padding:0.7rem; margin-bottom:1rem; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; }
        .blog-form textarea { min-height:200px; }
        .blog-form label { display:block; margin-bottom:0.3rem; color:var(--text-sec); font-size:0.85rem; }
        .blog-form button { padding:0.7rem 1.5rem; background:linear-gradient(135deg,var(--accent-1),var(--accent-2)); border:none; border-radius:50px; color:#fff; font-weight:600; cursor:pointer; font-family:inherit; }
        nav.dash-nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; }
        nav.dash-nav a { color:var(--accent-1); text-decoration:none; font-size:0.85rem; }
        nav.dash-nav a:hover { text-decoration:underline; }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <h1><i class="fas fa-shield-alt"></i> Admin Login</h1>
            <p>Enter your credentials to access the dashboard</p>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Admin email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit"><i class="fas fa-lock-open"></i> Sign In</button>
                <div id="loginError" class="error"></div>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <nav class="dash-nav">
            <h1 class="dash-title"><i class="fas fa-shield-alt"></i> Admin Dashboard <span id="pendingBadge" style="display:none;font-size:0.7rem;background:#ff6b35;color:#fff;padding:0.2rem 0.6rem;border-radius:50px;vertical-align:middle;font-weight:600;-webkit-text-fill-color:#fff"></span></h1>
            <div>
                <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i> View Site</a>
                <button id="logoutBtn" style="margin-left:1rem;padding:0.3rem 0.8rem;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-sec);cursor:pointer;font-family:inherit;font-size:0.8rem;">Logout</button>
            </div>
        </nav>

        <div class="stats" id="statsContainer"></div>

        <div class="tabs" id="tabContainer">
            <button class="tab-btn active" data-tab="contacts"><i class="fas fa-envelope"></i> Contacts</button>
            <button class="tab-btn" data-tab="orders"><i class="fas fa-shopping-cart"></i> Orders</button>
            <button class="tab-btn" data-tab="appointments"><i class="fas fa-calendar"></i> Appointments</button>
            <button class="tab-btn" data-tab="reviews"><i class="fas fa-star"></i> Reviews</button>
            <button class="tab-btn" data-tab="chat"><i class="fas fa-comments"></i> Chat</button>
            <button class="tab-btn" data-tab="blog"><i class="fas fa-blog"></i> Blog</button>
            <button class="tab-btn" data-tab="templates"><i class="fas fa-file-download"></i> Templates</button>
            <button class="tab-btn" data-tab="uploads"><i class="fas fa-upload"></i> Uploads</button>
            <button class="tab-btn" data-tab="clients"><i class="fas fa-user-friends"></i> Clients</button>
            <button class="tab-btn" data-tab="visitors"><i class="fas fa-globe"></i> Visitors</button>
            <button class="tab-btn" data-tab="deletions"><i class="fas fa-user-slash"></i> Deletions</button>
        </div>

        <div id="panel-contacts" class="panel active"></div>
        <div id="panel-orders" class="panel"></div>
        <div id="panel-appointments" class="panel"></div>
        <div id="panel-reviews" class="panel"></div>
        <div id="panel-chat" class="panel"></div>
        <div id="panel-blog" class="panel"></div>
        <div id="panel-templates" class="panel"></div>
        <div id="panel-uploads" class="panel"></div>
        <div id="panel-clients" class="panel"></div>
        <div id="panel-visitors" class="panel"></div>
        <div id="panel-deletions" class="panel"></div>
    </div>

    <script>
        const API = '';
        let token = localStorage.getItem('vit_admin_token');

        function getHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
        }
        function filterTable(inputId, tableId) {
            var q = document.getElementById(inputId).value.toLowerCase();
            var rows = document.getElementById(tableId).querySelectorAll('tbody tr');
            rows.forEach(function(r) { r.style.display = q ? (r.textContent.toLowerCase().indexOf(q) > -1 ? '' : 'none') : ''; });
        }

        function showLogin() { document.getElementById('loginPage').style.display = 'flex'; document.getElementById('dashboard').style.display = 'none'; }
        function showDashboard() { document.getElementById('loginPage').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; }

        if (token) { showDashboard(); loadStats(); loadPanel('contacts'); } else { showLogin(); }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            try {
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
                const res = await fetch(API + '/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const data = await res.json();
                if (data.success) { token = data.token; localStorage.setItem('vit_admin_token', token); showDashboard(); loadStats(); loadPanel('contacts'); }
                else { errorEl.textContent = data.error || 'Login failed'; btn.disabled = false; btn.innerHTML = '<i class="fas fa-lock-open"></i> Sign In'; }
            } catch { errorEl.textContent = 'Server unavailable'; btn.disabled = false; btn.innerHTML = '<i class="fas fa-lock-open"></i> Sign In'; }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            token = null; localStorage.removeItem('vit_admin_token'); showLogin();
        });

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
                loadPanel(btn.dataset.tab);
            });
        });

        async function loadPanel(name) {
            try {
                if (name === 'contacts') { const d = await fetch(API+'/api/contacts', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json()); renderContacts(d); }
                else if (name === 'orders') { const d = await fetch(API+'/api/orders', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json()); renderOrders(d); }
                else if (name === 'appointments') { const d = await fetch(API+'/api/appointments', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json()); renderAppointments(d); }
                else if (name === 'reviews') { const d = await fetch(API+'/api/reviews', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json()); renderReviews(d); }
                else if (name === 'chat') { const d = await fetch(API+'/api/chat', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json()); renderChat(d); }
                else if (name === 'templates') { const d = await fetch(API+'/api/admin/template-orders', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json()); renderTemplateOrders(d); }
                else if (name === 'uploads') { const d = await fetch(API+'/api/uploads', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json()); renderUploads(d); }
                else if (name === 'clients') { const d = await fetch(API+'/api/admin/clients', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json()); renderClients(d); }
                else if (name === 'visitors') { const d = await fetch(API+'/api/visitors', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json()); renderVisitors(d); }
                else if (name === 'deletions') { const d = await fetch(API+'/api/admin/delete-requests', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json()); renderDeletions(d); }
            } catch(e) { document.getElementById('panel-'+name).innerHTML = '<p style="color:#ff6b35">Error loading data. Make sure the server is running.</p>'; }
        }

        async function loadStats() {
            try {
                const s = await fetch(API+'/api/admin/stats', { headers: { 'Authorization': 'Bearer ' + token } }).then(r=>r.json());
                document.getElementById('statsContainer').innerHTML = `
                    <div class="stat-card"><div class="stat-num">${s.visitorCount||0}</div><div class="stat-label">Page Views</div></div>
                    <div class="stat-card"><div class="stat-num">${s.uniqueVisitors||0}</div><div class="stat-label">Unique Visitors</div></div>
                    <div class="stat-card"><div class="stat-num">${s.todayVisits||0}</div><div class="stat-label">Today</div></div>
                    <div class="stat-card"><div class="stat-num">${s.contactCount}</div><div class="stat-label">Messages</div></div>
                    <div class="stat-card"><div class="stat-num">${s.orderCount}</div><div class="stat-label">Orders</div></div>
                    <div class="stat-card"><div class="stat-num">${s.appointmentCount}</div><div class="stat-label">Appointments</div></div>
                `;
                const badge = document.getElementById('pendingBadge');
                const totalPending = (s.pendingOrders || 0) + (s.pendingReviews || 0);
                if (totalPending > 0) { badge.style.display = 'inline'; badge.textContent = totalPending + ' pending'; }
                else { badge.style.display = 'none'; }
            } catch {}
        }

        // Auto-refresh stats every 30s
        setInterval(loadStats, 30000);

        function renderContacts(data) {
            if (!data.length) { document.getElementById('panel-contacts').innerHTML = '<p style="color:var(--text-sec)">No messages yet</p>'; return; }
            document.getElementById('panel-contacts').innerHTML = `<div style="margin-bottom:0.5rem"><input id="filter-contacts" placeholder="Search contacts..." oninput="filterTable('filter-contacts','table-contacts')" style="width:100%;padding:0.5rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:#fff;font-family:inherit"></div><table id="table-contacts"><thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Phone</th><th>Subject</th><th>Message</th></tr></thead><tbody>
                ${data.map(c => `<tr><td>${new Date(c.created_at).toLocaleDateString()}</td><td>${c.name}</td><td>${c.email}</td><td>${c.phone||'-'}</td><td>${c.subject||'-'}</td><td><div class="msg">${c.message}</div></td></tr>`).join('')}
            </tbody></table>`;
        }

        function renderOrders(data) {
            if (!data.length) { document.getElementById('panel-orders').innerHTML = '<p style="color:var(--text-sec)">No orders yet</p>'; return; }
            document.getElementById('panel-orders').innerHTML = `<div style="margin-bottom:0.5rem"><input id="filter-orders" placeholder="Search orders..." oninput="filterTable('filter-orders','table-orders')" style="width:100%;padding:0.5rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:#fff;font-family:inherit"></div><table id="table-orders"><thead><tr><th>Date</th><th>Client</th><th>Service</th><th>Price</th><th>Status</th><th>Payment</th><th>Deposit</th><th>Actions</th></tr></thead><tbody>
                ${data.map(o => `<tr>
                    <td>${new Date(o.created_at).toLocaleDateString()}</td>
                    <td>${o.client_name}<br><small>${o.client_email}</small></td>
                    <td>${o.service}</td>
                    <td>${o.price||'-'}</td>
                    <td><span class="status ${o.status}">${o.status}</span></td>
                    <td><span class="status ${o.payment_status === 'paid' ? 'approved' : 'pending'}">${o.payment_status}</span></td>
                    <td>${o.deposit_paid ? 'Yes' : 'No'}</td>
                    <td>
                        <button class="action-btn" onclick="updateOrder('${o.id}','status','pending')">Pending</button>
                        <button class="action-btn" onclick="updateOrder('${o.id}','status','in_progress')">In Progress</button>
                        <button class="action-btn" onclick="updateOrder('${o.id}','status','completed')">Complete</button>
                        <button class="action-btn" onclick="updateOrder('${o.id}','payment_status','paid')">Mark Paid</button>
                        <button class="action-btn" onclick="updateOrder('${o.id}','deposit_paid','true')">Deposit</button>
                    </td>
                </tr>`).join('')}
            </tbody></table>`;
        }

        async function updateOrder(id, field, value) {
            const body = {};
            if (field === 'deposit_paid') body.deposit_paid = value === 'true';
            else body[field] = value;
            await fetch(API + '/api/orders/' + id, { method: 'PATCH', headers: getHeaders(), body: JSON.stringify(body) });
            loadPanel('orders'); loadStats();
        }

        function renderAppointments(data) {
            if (!data.length) { document.getElementById('panel-appointments').innerHTML = '<p style="color:var(--text-sec)">No appointments yet</p>'; return; }
            document.getElementById('panel-appointments').innerHTML = `<div style="margin-bottom:0.5rem"><input id="filter-appointments" placeholder="Search appointments..." oninput="filterTable('filter-appointments','table-appointments')" style="width:100%;padding:0.5rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:#fff;font-family:inherit"></div><table id="table-appointments"><thead><tr><th>Date</th><th>Time</th><th>Client</th><th>Service</th><th>Status</th><th>Actions</th></tr></thead><tbody>
                ${data.map(a => `<tr>
                    <td>${a.date}</td><td>${a.time}</td>
                    <td>${a.client_name}<br><small>${a.client_email}</small></td>
                    <td>${a.service}</td>
                    <td><span class="status ${a.status}">${a.status}</span></td>
                    <td>
                        <button class="action-btn" onclick="updateAppt('${a.id}','confirmed')">Confirm</button>
                        <button class="action-btn" onclick="updateAppt('${a.id}','completed')">Done</button>
                        <button class="action-btn" onclick="updateAppt('${a.id}','cancelled')">Cancel</button>
                    </td>
                </tr>`).join('')}
            </tbody></table>`;
        }

        async function updateAppt(id, status) {
            await fetch(API + '/api/appointments/' + id, { method: 'PATCH', headers: getHeaders(), body: JSON.stringify({ status }) });
            loadPanel('appointments');
        }

        function renderReviews(data) {
            if (!data.length) { document.getElementById('panel-reviews').innerHTML = '<p style="color:var(--text-sec)">No reviews yet</p>'; return; }
            document.getElementById('panel-reviews').innerHTML = `<div style="margin-bottom:0.5rem"><input id="filter-reviews" placeholder="Search reviews..." oninput="filterTable('filter-reviews','table-reviews')" style="width:100%;padding:0.5rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:#fff;font-family:inherit"></div><table id="table-reviews"><thead><tr><th>Date</th><th>Client</th><th>Rating</th><th>Service</th><th>Review</th><th>Status</th><th>Actions</th></tr></thead><tbody>
                ${data.map(r => `<tr>
                    <td>${new Date(r.created_at).toLocaleDateString()}</td>
                    <td>${r.client_name}</td>
                    <td>${'<i class="fas fa-star" style="color:#ffc107;font-size:0.7rem"></i>'.repeat(r.rating)}</td>
                    <td>${r.service||'-'}</td>
                    <td><div class="msg">${r.text}</div></td>
                    <td><span class="status ${r.approved ? 'approved' : 'pending'}">${r.approved ? 'Approved' : 'Pending'}</span></td>
                    <td>${!r.approved ? '<button class="action-btn" onclick="approveReview(\''+r.id+'\')">Approve</button>' : ''}</td>
                </tr>`).join('')}
            </tbody></table>`;
        }

        async function approveReview(id) {
            await fetch(API + '/api/reviews/' + id, { method: 'PATCH', headers: getHeaders(), body: JSON.stringify({ approved: true }) });
            loadPanel('reviews'); loadStats();
        }

        function renderChat(data) {
            document.getElementById('panel-chat').innerHTML = `<div style="max-height:500px;overflow-y:auto;margin-bottom:1rem">
                ${data.map(m => `<div style="padding:0.5rem;border-bottom:1px solid var(--border);${m.is_admin ? 'background:rgba(0,212,255,0.05)' : ''}">
                    <strong style="color:var(--accent-1)">${m.sender}</strong> <small style="color:var(--text-sec)">${new Date(m.created_at).toLocaleString()}</small>
                    <p style="margin-top:0.2rem;color:var(--text-sec)">${m.message}</p>
                </div>`).join('')}
            </div>
            <div style="display:flex;gap:0.5rem">
                <input type="text" id="adminChatInput" style="flex:1;padding:0.7rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:#fff;font-family:inherit" placeholder="Reply as admin...">
                <button onclick="sendAdminReply()" style="padding:0.7rem 1.2rem;background:linear-gradient(135deg,var(--accent-1),var(--accent-2));border:none;border-radius:8px;color:#fff;cursor:pointer"><i class="fas fa-paper-plane"></i></button>
            </div>`;
        }

        async function confirmTemplatePayment(orderId) {
            await fetch(API + '/api/admin/templates/confirm-payment', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ order_id: orderId }) });
            loadPanel('templates');
        }

        function renderTemplateOrders(data) {
            if (!data || !data.length) { document.getElementById('panel-templates').innerHTML = '<p style="color:var(--text-sec)">No template orders yet</p>'; return; }
            document.getElementById('panel-templates').innerHTML = `<div style="margin-bottom:0.5rem"><input id="filter-templates" placeholder="Search template orders..." oninput="filterTable('filter-templates','table-templates')" style="width:100%;padding:0.5rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:#fff;font-family:inherit"></div><table id="table-templates"><thead><tr><th>Date</th><th>Client</th><th>Template</th><th>Price</th><th>Payment</th><th>Status</th><th>Download Token</th><th>Actions</th></tr></thead><tbody>
                ${data.map(o => `<tr>
                    <td>${new Date(o.created_at).toLocaleDateString()}</td>
                    <td>${o.client_name}<br><small>${o.client_email}</small></td>
                    <td>${o.template_id}</td>
                    <td>${o.price}</td>
                    <td><span class="status ${o.payment_status === 'paid' ? 'approved' : 'pending'}">${o.payment_status}</span></td>
                    <td><span class="status ${o.status}">${o.status}</span></td>
                    <td style="font-size:0.7rem;font-family:monospace;max-width:120px;overflow:hidden;text-overflow:ellipsis">${o.download_token || '-'}</td>
                    <td>
                        ${o.payment_status !== 'paid'
                            ? `<button class="action-btn" onclick="confirmTemplatePayment('${o.id}')">Confirm Payment</button>`
                            : `<button class="action-btn" onclick="copyToken('${o.download_token}')">Copy Link</button>`}
                    </td>
                </tr>`).join('')}
            </tbody></table>
            <div style="margin-top:1rem;padding:0.8rem;background:rgba(0,212,255,0.05);border:1px solid var(--border);border-radius:8px;font-size:0.8rem;color:var(--text-sec)">
                <strong style="color:var(--accent-1)">How to deliver templates:</strong><br>
                1. Confirm payment → download link becomes active<br>
                2. Click "Copy Link" and send to customer via WhatsApp<br>
                3. Download link format: ${window.location.origin}/api/templates/download/TOKEN
            </div>`;
        }

        function copyToken(token) {
            const link = window.location.origin + '/api/templates/download/' + token;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link);
                alert('Download link copied to clipboard!');
            } else {
                prompt('Copy this download link:', link);
            }
        }

        function renderUploads(data) {
            if (!data || !data.length) { document.getElementById('panel-uploads').innerHTML = '<p style="color:var(--text-sec)">No client file uploads yet</p>'; return; }
            document.getElementById('panel-uploads').innerHTML = `<div style="margin-bottom:0.5rem"><input id="filter-uploads" placeholder="Search uploads..." oninput="filterTable('filter-uploads','table-uploads')" style="width:100%;padding:0.5rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:#fff;font-family:inherit"></div><table id="table-uploads"><thead><tr><th>Date</th><th>Client</th><th>Files</th></tr></thead><tbody>
                ${data.map(u => `<tr>
                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    <td>${u.client_name || u.client_email || 'Unknown'}</td>
                    <td>${u.files.map(f => `${f.original} (${(f.size/1024).toFixed(0)} KB)`).join('<br>')}</td>
                </tr>`).join('')}
            </tbody></table>
            <p style="color:var(--text-sec);font-size:0.8rem;margin-top:0.5rem">Files are stored on the server. Download via SFTP or server file manager.</p>`;
        }

        function renderClients(data) {
            if (!data || !data.length) { document.getElementById('panel-clients').innerHTML = '<p style="color:var(--text-sec)">No registered clients yet</p>'; return; }
            document.getElementById('panel-clients').innerHTML = `<div style="margin-bottom:0.5rem"><input id="filter-clients" placeholder="Search clients..." oninput="filterTable('filter-clients','table-clients')" style="width:100%;padding:0.5rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:#fff;font-family:inherit"></div>
            <table id="table-clients"><thead><tr><th>Status</th><th>Name</th><th>Email</th><th>Phone</th><th>Ref Code</th><th>Registered</th><th>Last Seen</th></tr></thead><tbody>
                ${data.map(c => `
                    <tr>
                        <td>${c.is_online ? '<span class="status" style="background:rgba(0,200,83,0.15);color:#00c853">● Online</span>' : '<span class="status" style="background:rgba(255,107,53,0.15);color:#ff6b35">○ Offline</span>'}</td>
                        <td>${c.name}</td>
                        <td>${c.email}</td>
                        <td>${c.phone || '-'}</td>
                        <td style="font-family:monospace;font-size:0.75rem">${c.referral_code || '-'}</td>
                        <td>${new Date(c.created_at).toLocaleDateString()}</td>
                        <td>${c.last_seen ? new Date(c.last_seen).toLocaleString() : 'Never'}</td>
                    </tr>
                `).join('')}
            </tbody></table>`;
        }

        function renderVisitors(data) {
            document.getElementById('panel-visitors').innerHTML = `
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem">
                    <div class="stat-card"><div class="stat-num">${data.total}</div><div class="stat-label">Total Views</div></div>
                    <div class="stat-card"><div class="stat-num">${data.unique}</div><div class="stat-label">Unique Visitors</div></div>
                    <div class="stat-card"><div class="stat-num">${data.today}</div><div class="stat-label">Today</div></div>
                </div>
                <h4 style="color:var(--accent-1);margin-bottom:1rem"><i class="fas fa-clock"></i> Recent 100 visits</h4>
                <table><thead><tr><th>Time</th><th>IP</th><th>Path</th><th>Referrer</th></tr></thead><tbody>
                ${data.recent.length ? data.recent.map(v => `
                    <tr>
                        <td>${new Date(v.created_at).toLocaleString()}</td>
                        <td style="font-family:monospace;font-size:0.75rem">${v.ip}</td>
                        <td>${v.path}</td>
                        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${v.referrer || '-'}</td>
                    </tr>
                `).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text-sec)">No visits yet</td></tr>'}
                </tbody></table>
            `;
        }

        async function sendAdminReply() {
            const input = document.getElementById('adminChatInput');
            const msg = input.value.trim();
            if (!msg) return;
            await fetch(API + '/api/chat', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ sender: 'Vincent IT (Admin)', message: msg, is_admin: true }) });
            input.value = '';
            loadPanel('chat');
        }

        async function handleDeletion(id, action) {
            if (action === 'approve' && !confirm('Delete this account permanently?')) return;
            await fetch(API + '/api/admin/delete-client/' + id, { method: 'POST', headers: getHeaders(), body: JSON.stringify({ action }) });
            loadPanel('deletions');
        }

        function renderDeletions(data) {
            if (!data.length) { document.getElementById('panel-deletions').innerHTML = '<p style="color:var(--text-sec)">No pending deletion requests</p>'; return; }
            document.getElementById('panel-deletions').innerHTML = `<table><thead><tr><th>Date</th><th>Client</th><th>Email</th><th>Reason</th><th>Actions</th></tr></thead><tbody>
                ${data.map(r => `<tr>
                    <td>${new Date(r.created_at).toLocaleDateString()}</td>
                    <td>${r.client_name}</td>
                    <td>${r.client_email}</td>
                    <td><div class="msg">${r.reason || '-'}</div></td>
                    <td>
                        <button class="action-btn" onclick="handleDeletion('${r.id}','approve')" style="color:#ff4444;border-color:#ff4444">Delete</button>
                        <button class="action-btn" onclick="handleDeletion('${r.id}','deny')">Deny</button>
                    </td>
                </tr>`).join('')}
            </tbody></table>`;
        }

        document.getElementById('panel-blog').innerHTML = `
            <div class="blog-form">
                <h3 style="margin-bottom:1rem;color:var(--accent-1)">Create New Blog Post</h3>
                <label>Title</label><input type="text" id="blogTitle">
                <label>Slug (URL-friendly, e.g. "my-post")</label><input type="text" id="blogSlug">
                <label>Excerpt (short description)</label><input type="text" id="blogExcerpt">
                <label>Author</label><input type="text" id="blogAuthor" value="Vincent IT">
                <label>Tags (comma separated)</label><input type="text" id="blogTags" placeholder="e.g. office, windows, tips">
                <label>Content (HTML supported)</label><textarea id="blogContent" placeholder="Write your post content here..."></textarea>
                <button onclick="createBlogPost()"><i class="fas fa-plus-circle"></i> Publish Post</button>
                <div id="blogMsg" class="form-message"></div>
            </div>
            <div style="margin-top:2rem">
                <h4 style="color:var(--accent-1);margin-bottom:1rem"><i class="fas fa-list"></i> Published Posts</h4>
                <div id="blogList"></div>
            </div>
        `;

        async function createBlogPost() {
            var btn = document.querySelector('#panel-blog .blog-form button');
            var editSlug = btn.dataset.editSlug;
            var isEdit = !!editSlug;
            var data = {
                title: document.getElementById('blogTitle').value.trim(),
                slug: document.getElementById('blogSlug').value.trim(),
                excerpt: document.getElementById('blogExcerpt').value.trim(),
                content: document.getElementById('blogContent').value.trim(),
                author: document.getElementById('blogAuthor').value.trim() || 'Vincent IT',
                tags: document.getElementById('blogTags').value.trim()
            };
            var msg = document.getElementById('blogMsg');
            if (!data.title || !data.slug || !data.content) { msg.innerHTML = '<span style="color:#ff6b35">Title, slug and content required</span>'; return; }
            try {
                var url, method;
                if (isEdit) { url = API + '/api/blog/' + editSlug; method = 'PUT'; }
                else { url = API + '/api/blog'; method = 'POST'; }
                var res = await fetch(url, { method: method, headers: getHeaders(), body: JSON.stringify(data) });
                await res.json();
                msg.innerHTML = '<span style="color:var(--accent-1)">' + (isEdit ? 'Post updated!' : 'Post published!') + '</span>';
                ['blogTitle','blogSlug','blogExcerpt','blogContent','blogTags'].forEach(function(id) { document.getElementById(id).value = ''; });
                btn.innerHTML = '<i class="fas fa-plus-circle"></i> Publish Post';
                delete btn.dataset.editSlug;
                loadBlogList();
            } catch { msg.innerHTML = '<span style="color:#ff6b35">Error ' + (isEdit ? 'updating' : 'creating') + ' post</span>'; }
        }

        async function deleteBlogPost(slug) {
            if (!confirm('Delete this blog post?')) return;
            try {
                await fetch(API + '/api/blog/' + slug, { method: 'DELETE', headers: getHeaders() });
                loadBlogList();
            } catch { alert('Delete failed'); }
        }
        function editBlogPost(p) {
            document.getElementById('blogTitle').value = p.title;
            document.getElementById('blogSlug').value = p.slug;
            document.getElementById('blogExcerpt').value = p.excerpt || '';
            document.getElementById('blogAuthor').value = p.author || 'Vincent IT';
            document.getElementById('blogTags').value = p.tags || '';
            document.getElementById('blogContent').value = p.content || '';
            var btn = document.querySelector('#panel-blog .blog-form button');
            btn.innerHTML = '<i class="fas fa-save"></i> Update Post';
            btn.dataset.editSlug = p.slug;
            document.getElementById('blogMsg').innerHTML = '<span style="color:var(--accent-1)">Editing: ' + p.title + '</span>';
        }
        async function loadBlogList() {
            try {
                const posts = await fetch(API + '/api/blog').then(r => r.json());
                document.getElementById('blogList').innerHTML = posts.length ? posts.map(p => `
                    <div style="padding:0.7rem;border:1px solid var(--border);border-radius:8px;margin-bottom:0.5rem;display:flex;justify-content:space-between;align-items:center">
                        <div><strong>${p.title}</strong><br><small style="color:var(--text-sec)">${new Date(p.created_at).toLocaleDateString()} — ${p.tags||''}</small></div>
                        <div style="display:flex;gap:0.3rem">
                            <button class="action-btn" onclick="editBlogPost(${JSON.stringify(p).replace(/"/g,'&quot;')})">Edit</button>
                            <button class="action-btn" onclick="deleteBlogPost('${p.slug}')">Delete</button>
                            <a href="/blog/?slug=${p.slug}" target="_blank" class="action-btn" style="text-decoration:none">View</a>
                        </div>
                    </div>
                `).join('') : '<p style="color:var(--text-sec)">No posts yet</p>';
            } catch {}
        }

        setTimeout(loadBlogList, 500);
    </script>
</body>
</html>
