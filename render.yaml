services:
  - type: web
    name: vincent-it-freelancer
    env: node
    buildCommand: npm install --prefix server
    startCommand: node server/server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@vincentit.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: WHATSAPP_NUMBER
        value: "27677834591"
      - key: WHATSAPP_INSTANCE_ID
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PAYFAST_MERCHANT_ID
        sync: false
      - key: PAYFAST_MERCHANT_KEY
        sync: false
      - key: PAYFAST_PASSPHRASE
        sync: false
      - key: PAYFAST_SANDBOX
        value: "true"
      - key: SITE_URL
        value: "https://vincent-it-freelancer.onrender.com"
      - key: CHATBOT_ENABLED
        value: "true"
      - key: AI_PROVIDER
        value: "groq"
      - key: AI_MODEL
        value: "llama-3.3-70b-versatile"
      - key: AI_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
